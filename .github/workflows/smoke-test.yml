name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Execute install_tool.sh and check_environment.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Run smoke test
        run: bash scripts/smoke-test.sh
