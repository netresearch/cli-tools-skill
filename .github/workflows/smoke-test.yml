name: Smoke Test

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  smoke-test:
    name: Execute install_tool.sh and check_environment.sh
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run smoke test
        run: bash scripts/smoke-test.sh
